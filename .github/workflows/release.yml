# =============================================================================
# GitHub Actions Release — Maven Central + Docker Hub + GitHub Releases
# =============================================================================
# Triggered when a version tag (v*) is pushed. Single pipeline that:
#   1. Validates tag matches gradle.properties version
#   2. Builds and publishes to Maven Central
#   3. Builds and pushes multi-platform Docker image to Docker Hub
#   4. Creates GitHub Release with shadow JARs
#
# IMPORTANT: Tests are NOT run here. They are already validated by the CI
# workflow on every push to master. Only push a tag after CI is green.
#
# Required GitHub Secrets:
#   MAVEN_CENTRAL_USERNAME  — Sonatype Central Portal user token username
#   MAVEN_CENTRAL_PASSWORD  — Sonatype Central Portal user token password
#   SIGNING_KEY_ID          — GPG key ID (last 8 hex digits)
#   SIGNING_PASSWORD        — GPG key passphrase
#   SIGNING_KEY             — ASCII-armored GPG private key
#   DOCKERHUB_USERNAME      — Docker Hub username
#   DOCKERHUB_TOKEN         — Docker Hub access token

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ===========================================================================
  # Job 1: Build, publish to Maven Central, create GitHub Release
  # ===========================================================================
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      major_minor: ${{ steps.version.outputs.major_minor }}

    steps:
      - name: Resolve ref
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract version
        id: version
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          VERSION="${TAG#v}"
          MAJOR_MINOR="$(echo "$VERSION" | cut -d. -f1-2)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate tag matches project version
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"
          PROJECT_VERSION=$(grep "^projectVersion=" gradle.properties | cut -d= -f2)
          echo "Tag version: $TAG_VERSION"
          echo "Project version: $PROJECT_VERSION"
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match project version ($PROJECT_VERSION)"
            exit 1
          fi

      - name: Build (tests skipped — already verified by CI)
        run: ./gradlew build -x test --no-daemon

      - name: Publish to Maven Central (Sonatype Central Portal)
        run: ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository --no-daemon
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_KEY }}

      - name: Build shadow JARs for release assets
        run: ./gradlew shadowJar --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          generate_release_notes: true
          files: |
            joltvm-agent/build/libs/*-all.jar
            joltvm-cli/build/libs/*-all.jar

  # ===========================================================================
  # Job 2: Build & push multi-platform Docker image (runs after Maven publish)
  # ===========================================================================
  docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: lucientong/joltvm
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.publish.outputs.version }}
            type=raw,value=${{ needs.publish.outputs.major_minor }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            JOLTVM_VERSION=${{ needs.publish.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
