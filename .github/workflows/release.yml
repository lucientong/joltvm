# =============================================================================
# GitHub Actions Release — Publish to Maven Central & GitHub Releases
# =============================================================================
# Triggered when a version tag (v*) is pushed. Publishes all modules to Maven
# Central via Sonatype Central Portal, and creates a GitHub Release with the
# shadow JARs attached.
#
# Required GitHub Secrets:
#   MAVEN_CENTRAL_USERNAME  — Sonatype Central Portal user token username
#   MAVEN_CENTRAL_PASSWORD  — Sonatype Central Portal user token password
#   SIGNING_KEY_ID          — GPG key ID (last 8 hex digits)
#   SIGNING_PASSWORD        — GPG key passphrase
#   SIGNING_KEY             — ASCII-armored GPG private key (gpg --export-secret-keys --armor <id>)

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ===========================================================================
  # Job 1: Build, test, publish to Maven Central
  # ===========================================================================
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate tag matches project version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PROJECT_VERSION=$(grep "^projectVersion=" gradle.properties | cut -d= -f2)
          echo "Tag version: $TAG_VERSION"
          echo "Project version: $PROJECT_VERSION"
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match project version ($PROJECT_VERSION)"
            exit 1
          fi

      - name: Build and test
        run: ./gradlew build --no-daemon

      - name: Publish to Maven Central (Sonatype Central Portal)
        run: ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository --no-daemon
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_KEY }}

      - name: Build shadow JARs for release assets
        run: ./gradlew shadowJar --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            joltvm-agent/build/libs/*-all.jar
            joltvm-cli/build/libs/*-all.jar
