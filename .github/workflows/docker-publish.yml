# =============================================================================
# GitHub Actions — Build & Publish Docker Image to Docker Hub
# =============================================================================
# Triggered on version tags (v*) and manual dispatch. Builds multi-platform
# images (linux/amd64, linux/arm64) and pushes to Docker Hub.
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME — Docker Hub username
#   DOCKERHUB_TOKEN    — Docker Hub access token
# =============================================================================

name: Docker Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish (e.g. v0.9.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------------------
      # Resolve the ref for both tag-push and manual dispatch triggers
      # -------------------------------------------------------------------
      - name: Resolve ref
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.ref }}

      # -------------------------------------------------------------------
      # Extract version components from the tag (e.g. v0.9.0 -> 0.9.0)
      # -------------------------------------------------------------------
      - name: Extract version
        id: version
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          VERSION="${TAG#v}"
          MAJOR_MINOR="$(echo "$VERSION" | cut -d. -f1-2)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"

      # -------------------------------------------------------------------
      # Docker setup
      # -------------------------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------------------------------------------------------------------
      # Image metadata (tags + OCI labels)
      # -------------------------------------------------------------------
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: lucientong/joltvm
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.major_minor }}

      # -------------------------------------------------------------------
      # Build & push multi-platform image
      # -------------------------------------------------------------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            JOLTVM_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
